    <script>
      (() => {
        const flagName = 'usePageCssSplit';
        const parse = value => {
          const normalized = String(value || '')
            .trim()
            .toLowerCase();
          if (['1', 'true', 'yes', 'on', 'enabled'].includes(normalized)) return true;
          if (['0', 'false', 'no', 'off', 'disabled'].includes(normalized)) return false;
          return null;
        };
        let enabled = false;
        try {
          const params = new URLSearchParams(window.location.search || '');
          const direct = parse(params.get(`ff_${flagName}`));
          if (direct !== null) {
            enabled = direct;
          } else {
            const flags = String(params.get('ff') || '')
              .split(',')
              .map(part => part.trim())
              .filter(Boolean);
            if (flags.includes(`-${flagName}`) || flags.includes(`!${flagName}`)) {
              enabled = false;
            } else if (flags.includes(flagName)) {
              enabled = true;
            } else {
              const stored = localStorage.getItem('ciphermaniacFeatureFlags');
              if (stored) {
                const parsed = JSON.parse(stored);
                if (typeof parsed?.[flagName] === 'boolean') {
                  enabled = parsed[flagName];
                }
              }
            }
          }
        } catch {}

        const styles = enabled
          ? ['/assets/style-core.css?v=20260327a', '/assets/style-cards.css?v=20260327a']
          : ['/assets/style-optimized.css?v=20260327b'];
        styles.forEach(href => {
          const link = document.createElement('link');
          link.rel = 'stylesheet';
          link.href = href;
          document.head.appendChild(link);
        });
      })();
    </script>

                  aria-label="Add another tournament"
                  hidden

    <script type="module">
      import { enhanceHeader } from '/assets/js/src/components/header.js';
      import { enhanceFooter } from '/assets/js/src/components/footer.js';
      import { shouldHideUnreadyFeatures } from '/assets/js/src/utils/releaseChannel.js';

      const header = document.querySelector('.site-header');
      if (shouldHideUnreadyFeatures()) {
        header?.querySelector('a[href="/players"]')?.remove();
        header?.querySelector('a[href="/toys"]')?.remove();
      }
      const connection = navigator.connection || {};
      const lowEndProfile = connection.saveData === true || ['slow-2g', '2g'].includes(connection.effectiveType || '');
      if (lowEndProfile) {
        document.body.classList.add('motion-deferred');
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            document.body.classList.remove('motion-deferred');
          });
        });
      }
      enhanceHeader(header);
      enhanceFooter(document.querySelector('.site-footer'));
    </script>
    <script src="/assets/js/src/loaders/cards.js" type="module"></script>
