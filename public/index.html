<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Ciphermaniac - Pokemon TCG Meta Analysis & Deck Statistics</title>
    <meta
      name="description"
      content="Analyze Pokemon TCG tournament data, deck archetypes, card usage statistics, and competitive meta trends. The ultimate tool for Pokemon TCG players looking to improve their game."
    />
    <meta
      name="keywords"
      content="Pokemon TCG, Pokemon TCG meta, deck analysis, card statistics, tournament data, Pokemon decks, competitive Pokemon, PTCG meta, Pokemon deck builder"
    />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://ciphermaniac.com/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ciphermaniac.com/" />
    <meta property="og:title" content="Ciphermaniac - Pokemon TCG Meta Analysis & Deck Statistics" />
    <meta
      property="og:description"
      content="Analyze Pokemon TCG tournament data, deck archetypes, card usage statistics, and competitive meta trends. The ultimate tool for Pokemon TCG players."
    />
    <meta property="og:image" content="https://ciphermaniac.com/assets/images/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Ciphermaniac" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@ciphermaniac" />
    <meta name="twitter:url" content="https://ciphermaniac.com/" />
    <meta name="twitter:title" content="Ciphermaniac - Pokemon TCG Meta Analysis" />
    <meta
      name="twitter:description"
      content="Analyze Pokemon TCG tournament data, deck archetypes, card usage statistics, and competitive meta trends."
    />
    <meta name="twitter:image" content="https://ciphermaniac.com/assets/images/og-image.png" />

    <!-- Favicon - PNG for Google compatibility -->
    <link rel="icon" type="image/png" sizes="48x48" href="/assets/images/favicon-48x48.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/images/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#fee475" />

    <!-- Preload critical font to reduce layout shift -->
    <link rel="preload" href="/assets/fonts/fraunces.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="stylesheet" href="/assets/style-optimized.css?v=20260327b" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Ciphermaniac",
        "alternateName": "Ciphermaniac Pokemon TCG Analysis",
        "url": "https://ciphermaniac.com",
        "description": "Pokemon TCG meta analysis tool for tournament data, deck archetypes, and card usage statistics.",
        "potentialAction": {
          "@type": "SearchAction",
          "target": {
            "@type": "EntryPoint",
            "urlTemplate": "https://ciphermaniac.com/cards?q={search_term_string}"
          },
          "query-input": "required name=search_term_string"
        }
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Ciphermaniac",
        "url": "https://ciphermaniac.com",
        "applicationCategory": "GameApplication",
        "operatingSystem": "Web Browser",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "description": "Free Pokemon TCG meta analysis tool providing tournament data, deck archetypes, card usage statistics, and competitive trends."
      }
    </script>
  </head>
  <body class="no-header">
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <main id="main-content" class="home-page" tabindex="-1">
      <section class="hero">
        <div class="hero-content">
          <h1 class="hero-title">
            <img
              src="/assets/images/logo.svg"
              alt="Ciphermaniac - Pokemon TCG Meta Analysis Tool"
              class="hero-logo"
              width="80"
              height="80"
            />
            Ciphermaniac
          </h1>

          <div class="hero-search">
            <div class="search-wrap">
              <svg
                class="search-icon"
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
                focusable="false"
              >
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
              </svg>
              <input
                id="hero-search-input"
                type="search"
                placeholder="Search cards…"
                aria-label="Search cards"
                autocomplete="off"
              />
              <datalist id="hero-card-names"></datalist>
              <div id="hero-card-suggestions" class="suggestions" role="listbox" aria-label="Card suggestions"></div>
            </div>
          </div>

        </div>
      </section>

      <section class="features-section" aria-label="Site features">
        <div class="features-grid">
          <a href="/cards" class="feature-card">
            <div class="feature-icon">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="32"
                height="32"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
                focusable="false"
              >
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="3" y1="9" x2="21" y2="9"></line>
                <line x1="9" y1="21" x2="9" y2="9"></line>
              </svg>
            </div>
            <div class="feature-copy">
              <h2>Browse Cards</h2>
              <p class="feature-detail">Card-level usage, copy counts, and event-level context.</p>
            </div>
          </a>

          <a href="/trends" class="feature-card">
            <div class="feature-icon">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="32"
                height="32"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
                focusable="false"
              >
                <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline>
                <polyline points="17 6 23 6 23 12"></polyline>
              </svg>
            </div>
            <div class="feature-copy">
              <h2>Meta Trends</h2>
              <p class="feature-detail">Time-window analysis for rising and declining strategies.</p>
            </div>
          </a>

          <a href="/archetypes" class="feature-card">
            <div class="feature-icon">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="32"
                height="32"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
                focusable="false"
              >
                <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
                <polyline points="10 9 9 9 8 9"></polyline>
              </svg>
            </div>
            <div class="feature-copy">
              <h2>Archetypes</h2>
              <p class="feature-detail">Ranked decks with share, finish, and matchup signals.</p>
            </div>
          </a>

        </div>
      </section>
    </main>

    <script type="module">
      import { createFooter } from '/assets/js/src/components/footer.js';
      import { initCardSearch } from '/assets/js/src/components/cardSearch.js';

      // Insert footer
      const footer = createFooter();
      document.body.insertAdjacentElement('beforeend', footer);

      // Initialize search
      initCardSearch({
        searchInputId: 'hero-search-input',
        datalistId: 'hero-card-names',
        suggestionsId: 'hero-card-suggestions',
        onSubmit: value => {
          if (value) {
            window.location.href = `/cards?q=${encodeURIComponent(value)}`;
          }
        }
      });
    </script>
  </body>
</html>
