<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f4ecdb">
  <title>Ciphermaniac — Pokémon TCG meta analysis</title>
  <meta name="description" content="Tournament data, archetype breakdowns, and card usage analysis for the Pokémon TCG.">

  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23f4ecdb'/%3E%3Ctext x='32' y='44' text-anchor='middle' font-family='system-ui,sans-serif' font-weight='800' font-size='40' fill='%23b8742a'%3EC%3C/text%3E%3C/svg%3E">

  <!-- Overlap TLS handshakes with JS download: report data comes from the R2
       custom domain and card art from the limitless CDN. On a 150ms-RTT mobile
       connection each cold handshake costs ~300-500ms if it waits for app boot. -->
  <link rel="preconnect" href="https://r2.ciphermaniac.com" crossorigin>
  <link rel="preconnect" href="https://limitlesstcg.nyc3.cdn.digitaloceanspaces.com">

  <!-- Inter is self-hosted (see src/styles/fonts.css); preload the three weights
       used above the fold so text renders in the right face on first paint. -->
  <link rel="preload" as="font" type="font/woff2" href="/fonts/inter-latin-400.woff2" crossorigin>
  <link rel="preload" as="font" type="font/woff2" href="/fonts/inter-latin-600.woff2" crossorigin>
  <link rel="preload" as="font" type="font/woff2" href="/fonts/inter-latin-700.woff2" crossorigin>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
