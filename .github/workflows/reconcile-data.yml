# =============================================================================
# Reconcile Derived Indexes (DB-MASTER-PLAN Phase 5/6)
# =============================================================================
# One reconciling entry point replacing the independent Python batch schedules
# (reprocess-event-indexes, rebuild-tournaments-index): re-bakes every event's
# cardUsage.json + conversion.json against the current synonyms and rebuilds
# reports/tournaments.json, through the consolidated shared builders.
#
# DRY RUN by default (reports drift only). Promotion to --write is a manual,
# reviewed dispatch — never on push.
# =============================================================================

name: (Data) Reconcile Derived Indexes

on:
  workflow_dispatch:
    inputs:
      apply:
        description: 'Write changes to R2 (otherwise dry run)'
        type: boolean
        default: false

concurrency:
  group: r2-bucket-writers
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Reconcile
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: npx tsx .github/scripts/reconcile-indexes.ts ${{ inputs.apply && '--write' || '' }}
