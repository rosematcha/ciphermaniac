# =============================================================================
# Reprocess Event Indexes (rolling canonicals)
# =============================================================================
# Re-bakes every stored event's card-facing artifacts (master.json, archetype
# cards.json, cardUsage.json, conversion.json, slice masters) with ROLLING
# canonicals: each card UID is re-resolved as of the event's date — the oldest
# print that was standard-legal and reasonably priced at the time — using the
# current card-synonyms.json clusters and the event-date print prices from
# assets/print-prices/{date}.json (TCGCSV backfill). Rebaked payloads carry a
# `canonicalizedAt` marker so the frontend skips read-time re-canonicalization.
# Runs straight from data already in R2 (no Labs re-download), via the shared
# TypeScript builders (event-cli reindex-all) — parity-proven against the
# legacy Python indexer, which this workflow no longer calls.
#
# Trigger: manual dispatch only. dry_run defaults to true — run it once to
# review the logged per-event cardUsage key movement, then run with
# dry_run=false.
# =============================================================================

name: (Card Metadata) Reprocess Event Indexes

run-name: >-
  Reprocess Event Indexes (dry_run=${{ inputs.dry_run }}${{ inputs.only && format(', only={0}', inputs.only) || '' }})

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Compute and log changes without uploading'
        required: false
        type: boolean
        default: true
      only:
        description: 'Process a single event folder by exact name (optional)'
        required: false
        type: string
      limit:
        description: 'Process at most N events (optional; blank = all)'
        required: false
        type: string
  # Reusable: the synonyms workflow calls this (with dry_run=false) after a
  # successful publish so derived indexes never lag the new canonicals (P-32).
  workflow_call:
    inputs:
      dry_run:
        description: 'Compute and log changes without uploading'
        required: false
        type: boolean
        default: true
      only:
        description: 'Process a single event folder by exact name (optional)'
        required: false
        type: string
      limit:
        description: 'Process at most N events (optional; blank = all)'
        required: false
        type: string

# All R2 bucket writers share one concurrency group so producers and repair
# jobs can never mutate the bucket at the same time (DB-MASTER-PLAN Phase 0).
concurrency:
  group: r2-bucket-writers
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  reprocess:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rebake event artifacts (rolling canonicals)
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          args=()
          if [ "${{ inputs.dry_run }}" = "true" ]; then args+=(--dry-run); fi
          if [ -n "${{ inputs.only }}" ]; then args+=(--only "${{ inputs.only }}"); fi
          if [ -n "${{ inputs.limit }}" ]; then args+=(--limit "${{ inputs.limit }}"); fi
          npx tsx .github/scripts/event-cli.ts reindex-all "${args[@]}"

      - name: Summary
        if: always()
        run: |
          echo "## Reprocess Event Indexes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- dry_run: \`${{ inputs.dry_run }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- only: \`${{ inputs.only || 'all events' }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- limit: \`${{ inputs.limit || 'none' }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See the job log for per-event artifact counts and cardUsage key movement." >> $GITHUB_STEP_SUMMARY
