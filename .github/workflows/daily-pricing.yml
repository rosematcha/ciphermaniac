# =============================================================================
# Daily Price Check
# =============================================================================
# Updates card pricing data from external pricing APIs.
# Stores price history in Cloudflare R2 for trend analysis.
#
# Triggers:
#   - Daily at 14:00 UTC (after the 12:00 online-meta build it reads from)
#   - Manual dispatch
# =============================================================================

name: (Daily Chore) Daily Price Check

run-name: >-
  ${{ github.event_name == 'schedule' && 'Daily Price Update' || 'Price Update (manual)' }}

on:
  schedule:
    # 14:00 UTC: pricing reads the online-meta output produced at 12:00, so it
    # must not race that build (DB-MASTER-PLAN Phase 0 implicit-dependency fix).
    - cron: '0 14 * * *'
  workflow_dispatch:

# All R2 bucket writers share one concurrency group so producers and repair
# jobs can never mutate the bucket at the same time (DB-MASTER-PLAN Phase 0).
concurrency:
  group: r2-bucket-writers
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  update-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r .github/scripts/requirements.txt

      - name: Update card prices
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ciphermaniac-reports
        run: python .github/scripts/update-prices.py

      - name: Summary
        run: |
          echo "## Daily Price Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Price data updated successfully" >> $GITHUB_STEP_SUMMARY
