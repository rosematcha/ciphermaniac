# =============================================================================
# Download Tournament Report
# =============================================================================
# Downloads and processes individual tournament data from Limitless Labs.
# Use for adding specific tournaments to the dataset on-demand.
#
# Triggers:
#   - Manual dispatch only (requires tournament URL)
#
# Options:
#   - Anonymize player names for privacy
# =============================================================================

name: Download Tournament

run-name: >-
  Download Tournament${{ inputs.anonymize == true && ' (anonymized)' || '' }}

on:
  workflow_dispatch:
    inputs:
      limitless_url:
        description: 'Tournament reference: Labs URL/code or Limitless URL/ID (e.g., 0054, https://labs.limitlesstcg.com/0054/standings, https://limitlesstcg.com/tournaments/517, 517)'
        required: true
        type: string
      anonymize:
        description: 'Anonymize player names'
        required: false
        type: boolean
        default: false

concurrency:
  group: download-tournament-${{ github.ref }}
  cancel-in-progress: false # Don't cancel - each tournament download is unique

permissions:
  contents: read

jobs:
  download-tournament:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Validate tournament input
        id: normalize
        run: |
          INPUT="${{ inputs.limitless_url }}"

          if [[ -z "$INPUT" ]]; then
            echo "Input is required."
            exit 1
          fi

          echo "ref=${INPUT}" >> $GITHUB_OUTPUT
          echo "Tournament input: $INPUT"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 boto3

      - name: Download and process tournament
        env:
          LIMITLESS_INPUT: ${{ steps.normalize.outputs.ref }}
          ANONYMIZE: ${{ inputs.anonymize }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ciphermaniac-reports
        run: python .github/scripts/download-tournament.py

      - name: Summary
        run: |
          echo "## Tournament Download" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Input**: \`${{ inputs.limitless_url }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Resolved Input**: \`${{ steps.normalize.outputs.ref }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Anonymized**: ${{ inputs.anonymize == true && 'Yes' || 'No' }}" >> $GITHUB_STEP_SUMMARY
