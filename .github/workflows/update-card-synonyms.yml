# =============================================================================
# Update Card Synonyms
# =============================================================================
# Generates card synonyms database for fuzzy search and card name matching.
# Maps alternate names, abbreviations, and common misspellings to canonical names.
#
# Triggers:
#   - Daily at 6:00 AM UTC (captures new tournament ingestions within 24h)
#   - Manual dispatch with optional commit toggle
# =============================================================================

name: (Card Metadata) Synonyms

run-name: >-
  ${{ github.event_name == 'schedule' && 'Daily Synonyms Update' ||
      format('Synonyms Update (commit={0}, full_rewrite={1})', inputs.commit_to_repo, inputs.full_rewrite) }}

on:
  schedule:
    - cron: '0 6 * * *' # Daily at 6:00 AM UTC
  workflow_dispatch:
    inputs:
      commit_to_repo:
        description: 'Commit updated synonyms to repository'
        required: false
        type: boolean
        default: true
      full_rewrite:
        description: 'Full rewrite (ignore existing synonyms cache)'
        required: false
        type: boolean
        default: false

# All R2 bucket writers share one concurrency group so producers and repair
# jobs can never mutate the bucket at the same time (DB-MASTER-PLAN Phase 0).
concurrency:
  group: r2-bucket-writers
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-synonyms:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      # Semantic flag emitted by the script (mappings only, metadata excluded):
      # the raw file diff is always dirty because metadata.generated changes
      # every run, so it must not gate downstream reprocessing.
      mappings_changed: ${{ steps.generate.outputs.mappings_changed }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate and upload card synonyms
        id: generate
        run: npx tsx .github/scripts/update-card-synonyms.mjs
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          PUBLIC_R2_BASE_URL: https://r2.ciphermaniac.com
          FULL_REWRITE: ${{ inputs.full_rewrite || 'false' }}

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet public/assets/card-synonyms.json 2>/dev/null; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit changes
        if: (inputs.commit_to_repo == true || github.event_name == 'schedule') && steps.check_changes.outputs.has_changes == 'true'
        env:
          HUSKY: 0
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/assets/card-synonyms.json
          git commit -m "chore: update card synonyms [skip ci]"
          git push

      - name: Summary
        run: |
          echo "## Card Synonyms Update" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check_changes.outputs.has_changes }}" == "true" ]; then
            echo "Synonyms database updated" >> $GITHUB_STEP_SUMMARY
          else
            echo "No changes - synonyms are up to date" >> $GITHUB_STEP_SUMMARY
          fi

  # When synonyms change, re-bake every stored event's derived cardUsage.json /
  # conversion.json against the new canonicals (P-32). The reprocess job reads
  # synonyms and event data straight from R2 over authenticated S3, so it never
  # sees the stale public edge cache. Runs live (dry_run=false).
  reprocess-indexes:
    needs: update-synonyms
    if: needs.update-synonyms.outputs.mappings_changed == 'true'
    uses: ./.github/workflows/reprocess-event-indexes.yml
    with:
      dry_run: false
    secrets: inherit
