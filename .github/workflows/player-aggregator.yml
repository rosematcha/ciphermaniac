# =============================================================================
# Player Aggregator
# =============================================================================
# Builds career-wide player profiles from every tournament listed in
# reports/tournaments.json. Writes:
#   - players/index.json
#   - players/{id}/profile.json
#   - players/{id}/decks.json
#   - players/_manifest.json
#
# Incremental: only players whose tournament membership has changed since the
# previous run are rewritten (tracked via players/_manifest.json). The first
# run back-fills the entire dataset; subsequent runs are cheap.
#
# Triggers:
#   - Daily at 13:00 UTC (after the meta builder at 12:00)
#   - After Online Meta Report finishes (in case the daily slot is shifted)
#   - After a manual Download Tournament run completes
#   - After a Refresh Tournaments Index run completes
#   - Manual dispatch (with optional force_full_rebuild)
# =============================================================================

name: (Daily Chore) Player Aggregator

run-name: >-
  ${{ github.event_name == 'workflow_run' && format('Player Aggregator (post-{0})', github.event.workflow_run.name) ||
      github.event_name == 'schedule' && 'Player Aggregator (daily)' ||
      format('Player Aggregator (force_full_rebuild={0})', inputs.force_full_rebuild || false) }}

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_run:
    workflows:
      - '(Daily Chore) Online Meta Report'
      - 'Download Tournament'
      - 'Refresh Tournaments Index'
    types:
      - completed
  workflow_dispatch:
    inputs:
      force_full_rebuild:
        description: 'Ignore players/_manifest.json and rewrite every profile (use to back-fill or recover from a corrupt manifest)'
        required: false
        type: boolean
        default: false

# All R2 bucket writers share one concurrency group so producers and repair
# jobs can never mutate the bucket at the same time (DB-MASTER-PLAN Phase 0).
concurrency:
  group: r2-bucket-writers
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-players:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    # workflow_run fires even for failed upstream runs — only continue when the
    # upstream succeeded (manual + schedule always proceed).
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Wait for upstream data to settle
        if: github.event_name == 'workflow_run'
        run: |
          echo "Waiting 60s for upstream R2 writes to settle..."
          sleep 60

      - name: Run player aggregator
        run: npx tsx .github/scripts/run-player-aggregator.ts
        env:
          R2_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME || 'ciphermaniac-reports' }}
          FORCE_FULL_REBUILD: ${{ github.event.inputs.force_full_rebuild || 'false' }}
