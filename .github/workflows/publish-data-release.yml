# =============================================================================
# Publish Data Release (DB-MASTER-PLAN Phase 4)
# =============================================================================
# Atomic, reversible data promotion. The Pages deployment is the user-facing
# activation point: a failure before it leaves the old app + release active; a
# failure after it does not invalidate the deployed app because that deployment
# embeds an immutable manifest.
#
# The production cutover is live and verified, so this reconciling release runs
# on a daily schedule (15:00 UTC — after the legacy producers refresh online meta,
# player aggregates, trends, and prices) to keep the served release fresh, and can
# still be dispatched manually (choose shadow to rehearse without touching prod).
# Promotion of the production channel pointer is a separate, post-deploy,
# ETag-conditional step so the deployed bundle and the tooling pointer cannot
# diverge. It never runs on push.
# =============================================================================

name: (Data) Publish Data Release

on:
  schedule:
    # Daily, after daily-pricing (14:00 UTC) so the captured scopes are current.
    - cron: '0 15 * * *'
  workflow_dispatch:
    inputs:
      channel:
        description: 'Target channel'
        type: choice
        options: [shadow, production]
        default: shadow

concurrency:
  # Shares the bucket-writer group so a release never races a legacy producer.
  group: r2-bucket-writers
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

env:
  # Scheduled runs carry no inputs -> always target production. Manual runs honor
  # the chosen channel (shadow rehearses the full path without promoting prod).
  CHANNEL: ${{ github.event.inputs.channel || 'production' }}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # 1. Dry-run plan so a manual operator sees the dirty set before writing.
      #    Skipped on the daily schedule (unattended) to avoid a redundant rebuild.
      - name: Plan build graph
        if: github.event_name == 'workflow_dispatch'
        env:
          R2_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: npx tsx .github/scripts/build-loop.ts

      - name: Build and publish all scopes
        env:
          R2_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          LITE: ${{ env.CHANNEL == 'shadow' && '--lite' || '' }}
        run: npx tsx .github/scripts/build-loop.ts --write $LITE --emit-roots roots.json --emit-served served.json --emit-events events.json

      # 2-4. Compose + validate the release manifest and generate the embed module.
      #      composeRelease refuses any non-immutable root.
      - name: Compose release + embed module
        run: >-
          npx tsx .github/scripts/publish-release.ts
          --roots roots.json
          --served served.json
          --events events.json
          --release-id "$(date -u +%Y%m%dT%H%M%SZ)-${GITHUB_SHA::7}"
          --published-at "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          --manifest-out release-manifest.json
          --module-out src/generated/release.ts

      # 5. Build the frontend + Pages Functions with the manifest embedded.
      - name: Build with embedded manifest
        run: npm run build

      # 6. Deploy Cloudflare Pages atomically (the activation point).
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=ciphermaniac

      # 7. Update the channel pointer for tooling (ETag-conditional, replan on conflict).
      #    Runs AFTER the deploy so the bundle and pointer cannot diverge.
      - name: Update channel pointer
        env:
          R2_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: npx tsx .github/scripts/update-channel.ts --channel "$CHANNEL" --manifest release-manifest.json

      # 8. Prior Pages deployment + prior release remain for rollback (no action).
      # 9. Expired unreferenced releases are GC'd by a separate protected job.
